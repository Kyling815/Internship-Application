services:
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL to your AWS RDS PostgreSQL URL}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      APP_DEBUG: ${APP_DEBUG:-true}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      LOCAL_UPLOAD_DIR: ${LOCAL_UPLOAD_DIR:-uploads}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-10}
      ALLOWED_UPLOAD_EXTENSIONS: ${ALLOWED_UPLOAD_EXTENSIONS:-.pdf,.doc,.docx,.txt,.png,.jpg,.jpeg}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-8001}
    ports:
      - "5173:5173"
    depends_on:
      - backend
